version: '3.8'

services:
  api:
    build: . 
    container_name: payment_api
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - HOST=0.0.0.0 
      - NODE_ENV=development
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_USER=adonis_user
      - DB_PASSWORD=adonis_password
      - DB_DATABASE=payment_gateway
    depends_on:
      - mysql_db
      - gateways_mock

  mysql_db:
    image: mysql:8.0
    container_name: gateway_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_gateway
      MYSQL_USER: adonis_user
      MYSQL_PASSWORD: adonis_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    
  gateways_mock:
    image: matheusprotzen/gateways-mock
    container_name: gateways_mock_api
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  mysql_data: